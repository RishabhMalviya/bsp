seed: 0
log_dir: runs

wandb:
  project: bsp
  entity: null
  name: null
  group: null
  mode: online  # online | offline | disabled

env:
  domain: humanoid
  task: stand
  max_episode_steps: 1000  # also set by default in dm-control

curiosity_pre_training:
  training_loop:
    num_collection_episodes: 10
    num_training_episodes: 10
  total_timesteps: 
  dynamics_predictor:
    hidden: 256
    depth: 2
    replay_buffer:
      capacity: 1_000_000
  curiosity_agent:
    replay_buffer:
      capacity: 10_000
      batch_size: 256
    actor:
      hidden: 256
      depth: 2
      lr: 1e-4
    critic:
      hidden: 256
      depth: 2
      lr: 1e-4


task_training:
  actor:
    hidden: 256
    depth: 2
  critic:
    hidden: 256
    depth: 2

  num_iterations: 100
  total_steps: 1000000
  batch_size: 256
  lr: 3.0e-4

train:
  num_iterations: 100
  total_steps: 1000000
  batch_size: 256
  lr: 3.0e-4
  gamma: 0.99
