# Which finetuning agent to train with:
#   bsp     -> the hand-rolled BSPAgent (bsp.finetuning.trainer.TaskSpecificTrainer)
#   sb3_sac -> the vendored stable_baselines3 SAC (bsp.finetuning.sb3_trainer.SB3SACTrainer)
agent_type: sb3_sac

total_num_episodes: 10_000
max_episode_len: 1_000
num_collections_per_loop: 1
utd: 10
batch_size: 512
H_max: 16
video_interval: 2_500      # in collected episodes
ckpt_interval: 2_500       # in collected episodes
eval_interval: 1           # in collected episodes
eval_num_episodes: 5

# Normalize observations with running mean/std stats (updated from collected data)
# before feeding them to the actor and critic.
normalize_obs: true

# Path to a pretrained `dynamics_transformer.pth` to warm-start the policy.
# null trains the DynamicsTransformer from scratch. main.py sets this to the
# checkpoint produced by the preceding pretraining run.
dpt_checkpoint_path: null

replay_buffer:
  capacity: 100_000

agent:
  gamma: 0.99

actor:
  actor_lr: 1e-4
  entropy_coef: 5e-2
  smoothness_coef: 1e-3
  abs_action_coef: 5e-2
  max_grad_norm: 1.0

critic:
  hidden: 256
  depth: 2
  critic_lr: 1e-4
  tau: 1e-3
  max_grad_norm: 1.0
  target_noise: 0.1
  target_noise_clip: 0.25

# Settings for the stable_baselines3 SAC agent (agent_type: sb3_sac).
sb3:
  # Which block of src/bsp/stable_baselines3/sac/sac.yaml to pull hyperparameters
  # from. `default` mirrors stable_baselines3' own defaults.
  hparam_key: default
  # Inline overrides applied on top of the selected sac.yaml block (e.g. n_timesteps,
  # learning_starts) without editing the vendored yaml.
  overrides: null
  # Eval / video / checkpoint cadence, in environment timesteps.
  eval_freq: 5_000
  video_freq: 25_000
  ckpt_freq: 25_000
