      lr: 0.0001
      batch_size: 32
    replay_buffer:
      capacity: 1000000
  curiosity_agent:
    batch_size: 32
    gamma: 0.99
    replay_buffer:
      capacity: 10000
    actor:
      hidden: 64
      depth: 2
      lr: 0.0001
    critic:
      hidden: 64
      depth: 2
      lr: 0.0001
      tau: 0.001
task_training:
  actor:
    hidden: 256
    depth: 2
  critic:
    hidden: 256
